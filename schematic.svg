<?xml version="1.0" encoding="UTF-8"?>
<svg width="1100" height="680" viewBox="0 0 1100 680"
     xmlns="http://www.w3.org/2000/svg"
     font-family="Arial, sans-serif" font-size="13">

  <style>
    .lbl  { font-size: 13px; fill: #111; }
    .val  { font-size: 11px; fill: #444; }
    .pin  { font-size: 13px; fill: #111; font-weight: bold; }
    .head { font-size: 16px; font-weight: bold; fill: #111; }
    .note { font-size: 11px; fill: #555; font-style: italic; }
    line  { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- background -->
  <rect width="1100" height="680" fill="white"/>
  <rect x="8" y="8" width="1084" height="664" fill="none" stroke="#bbb" stroke-width="1"/>

  <!-- title -->
  <text x="550" y="36" text-anchor="middle" class="head">CV Tap Tempo Mod — schemat ideowy (jeden pedał)</text>

  <!-- ═══════════════════════════════════════
       ŚCIEŻKA A / B  (y = 200 → A=140, B=260)
       ═══════════════════════════════════════ -->

  <!-- Jack A -->
  <circle cx="68" cy="140" r="15" fill="white" stroke="black" stroke-width="2"/>
  <text x="68" y="136" text-anchor="middle" class="pin">●</text>
  <text x="52" y="122" class="lbl">CV A</text>
  <text x="52" y="136" class="val">jack</text>
  <!-- sleeve GND -->
  <line x1="68" y1="155" x2="68" y2="176" stroke="black" stroke-width="2"/>
  <line x1="55" y1="176" x2="81" y2="176" stroke="black" stroke-width="2.5"/>
  <line x1="60" y1="184" x2="76" y2="184" stroke="black" stroke-width="2.5"/>
  <line x1="65" y1="192" x2="71" y2="192" stroke="black" stroke-width="2.5"/>
  <!-- tip wire right -->
  <line x1="83" y1="140" x2="160" y2="140" stroke="black" stroke-width="2"/>

  <!-- Jack B -->
  <circle cx="68" cy="260" r="15" fill="white" stroke="black" stroke-width="2"/>
  <text x="68" y="256" text-anchor="middle" class="pin">●</text>
  <text x="52" y="242" class="lbl">CV B</text>
  <text x="52" y="256" class="val">jack</text>
  <!-- sleeve GND -->
  <line x1="68" y1="275" x2="68" y2="296" stroke="black" stroke-width="2"/>
  <line x1="55" y1="296" x2="81" y2="296" stroke="black" stroke-width="2.5"/>
  <line x1="60" y1="304" x2="76" y2="304" stroke="black" stroke-width="2.5"/>
  <line x1="65" y1="312" x2="71" y2="312" stroke="black" stroke-width="2.5"/>
  <!-- tip wire right -->
  <line x1="83" y1="260" x2="160" y2="260" stroke="black" stroke-width="2"/>

  <!-- SELECT switch (3-poz ON/OFF/ON)
       kontakty A=(160,140) B=(160,260) common=(220,200) -->
  <circle cx="160" cy="140" r="4" fill="black"/>
  <circle cx="160" cy="260" r="4" fill="black"/>
  <circle cx="220" cy="200" r="4" fill="black"/>
  <!-- ostrze A (aktywne) -->
  <line x1="160" y1="140" x2="218" y2="200" stroke="black" stroke-width="2"/>
  <!-- ostrze B (nieaktywne, przerywane) -->
  <line x1="160" y1="260" x2="218" y2="200" stroke="black" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- etykieta -->
  <text x="126" y="207" text-anchor="end" class="lbl">SELECT</text>
  <text x="126" y="221" text-anchor="end" class="val">A / OFF / B</text>

  <!-- drut od common SELECT do sekcji HP -->
  <line x1="220" y1="200" x2="290" y2="200" stroke="black" stroke-width="2"/>

  <!-- ═══════════════════
       FILTR HP (x: 290–440)
       ═══════════════════ -->

  <!-- węzeł przed C1 -->
  <circle cx="290" cy="200" r="5" fill="black"/>
  <!-- drut w górę do ścieżki bypass -->
  <line x1="290" y1="200" x2="290" y2="158" stroke="black" stroke-width="2"/>

  <!-- SW_HP bypass (y=158) — normalnie otwarty -->
  <line x1="290" y1="158" x2="338" y2="158" stroke="black" stroke-width="2"/>
  <circle cx="338" cy="158" r="4" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="370" cy="158" r="4" fill="none" stroke="black" stroke-width="2"/>
  <line x1="374" y1="158" x2="440" y2="158" stroke="black" stroke-width="2"/>
  <line x1="440" y1="158" x2="440" y2="200" stroke="black" stroke-width="2"/>
  <!-- etykieta SW_HP -->
  <text x="354" y="146" text-anchor="middle" class="lbl">SW_HP</text>
  <text x="354" y="134" text-anchor="middle" class="val">bypass  (norm. otwarty)</text>

  <!-- C1 (0.1µF) w ścieżce głównej -->
  <line x1="290" y1="200" x2="358" y2="200" stroke="black" stroke-width="2"/>
  <!-- płyty kondensatora -->
  <line x1="358" y1="183" x2="358" y2="217" stroke="black" stroke-width="3"/>
  <line x1="367" y1="183" x2="367" y2="217" stroke="black" stroke-width="3"/>
  <line x1="367" y1="200" x2="440" y2="200" stroke="black" stroke-width="2"/>
  <!-- etykieta C1 (nad drutem, między płytami) -->
  <text x="362" y="176" text-anchor="middle" class="lbl">C1</text>
  <text x="362" y="163" text-anchor="middle" class="val">0.1µF</text>

  <!-- node_AB (po C1 / dołączenie bypass) -->
  <circle cx="440" cy="200" r="5" fill="black"/>

  <!-- R1 shunt 10kΩ do GND -->
  <line x1="440" y1="200" x2="440" y2="226" stroke="black" stroke-width="2"/>
  <rect x="425" y="226" width="30" height="50" fill="white" stroke="black" stroke-width="2"/>
  <text x="476" y="244" class="lbl">R1</text>
  <text x="476" y="258" class="val">10kΩ</text>
  <line x1="440" y1="276" x2="440" y2="302" stroke="black" stroke-width="2"/>
  <!-- GND -->
  <line x1="425" y1="302" x2="455" y2="302" stroke="black" stroke-width="2.5"/>
  <line x1="430" y1="310" x2="450" y2="310" stroke="black" stroke-width="2.5"/>
  <line x1="435" y1="318" x2="445" y2="318" stroke="black" stroke-width="2.5"/>
  <text x="440" y="334" text-anchor="middle" class="val">GND</text>

  <!-- R2 (1kΩ) od node_AB do bazy TR1 -->
  <line x1="440" y1="200" x2="482" y2="200" stroke="black" stroke-width="2"/>
  <rect x="482" y="186" width="54" height="28" fill="white" stroke="black" stroke-width="2"/>
  <text x="509" y="198" text-anchor="middle" class="val">R2</text>
  <text x="509" y="210" text-anchor="middle" class="val">1kΩ</text>
  <line x1="536" y1="200" x2="566" y2="200" stroke="black" stroke-width="2"/>

  <!-- ═══════════════════
       D1 (1N4148) — klamp bazy TR1
       ═══════════════════ -->
  <!-- junction na drut bazowy -->
  <circle cx="548" cy="200" r="5" fill="black"/>
  <!-- drut w dół -->
  <line x1="548" y1="200" x2="548" y2="208" stroke="black" stroke-width="2"/>
  <!-- katoda bar -->
  <line x1="537" y1="208" x2="559" y2="208" stroke="black" stroke-width="2.5"/>
  <!-- trójkąt diody (wierzchołek u góry = katoda, podstawa na dole = anoda) -->
  <polygon points="548,208 539,226 557,226" fill="black"/>
  <!-- drut od anody do GND -->
  <line x1="548" y1="226" x2="548" y2="256" stroke="black" stroke-width="2"/>
  <line x1="535" y1="256" x2="561" y2="256" stroke="black" stroke-width="2.5"/>
  <line x1="540" y1="264" x2="556" y2="264" stroke="black" stroke-width="2.5"/>
  <line x1="545" y1="272" x2="551" y2="272" stroke="black" stroke-width="2.5"/>
  <!-- etykieta -->
  <text x="564" y="215" class="val">D1</text>
  <text x="564" y="227" class="val">1N4148</text>

  <!-- ═══════════════════
       TR1 (BC547) — centrum (620, 200)
       ═══════════════════ -->
  <!-- pionowy pasek bazy -->
  <line x1="566" y1="170" x2="566" y2="230" stroke="black" stroke-width="3"/>
  <!-- kolektor (w górę-prawo) -->
  <line x1="566" y1="180" x2="610" y2="143" stroke="black" stroke-width="2"/>
  <!-- emiter (w dół-prawo) ze strzałką -->
  <line x1="566" y1="220" x2="610" y2="257" stroke="black" stroke-width="2"/>
  <!-- strzałka na emiterze -->
  <polygon points="596,247 610,257 602,260" fill="black"/>
  <!-- koło tranzystora -->
  <circle cx="578" cy="200" r="32" fill="none" stroke="black" stroke-width="2"/>
  <!-- etykiety terminali -->
  <text x="550" y="196" text-anchor="middle" class="pin">B</text>
  <text x="614" y="140" class="pin">C</text>
  <text x="614" y="264" class="pin">E</text>
  <!-- etykieta komponentu -->
  <text x="618" y="198" class="lbl">TR1</text>
  <text x="618" y="212" class="val">BC547</text>

  <!-- emiter TR1 do GND -->
  <line x1="610" y1="257" x2="656" y2="257" stroke="black" stroke-width="2"/>
  <line x1="656" y1="257" x2="656" y2="322" stroke="black" stroke-width="2"/>
  <line x1="641" y1="322" x2="671" y2="322" stroke="black" stroke-width="2.5"/>
  <line x1="646" y1="330" x2="666" y2="330" stroke="black" stroke-width="2.5"/>
  <line x1="651" y1="338" x2="661" y2="338" stroke="black" stroke-width="2.5"/>
  <text x="656" y="354" text-anchor="middle" class="val">GND</text>

  <!-- ═══════════════════════════════════════
       ŚCIEŻKA C  (y = 460)
       ═══════════════════════════════════════ -->

  <!-- Jack C -->
  <circle cx="68" cy="460" r="15" fill="white" stroke="black" stroke-width="2"/>
  <text x="68" y="456" text-anchor="middle" class="pin">●</text>
  <text x="52" y="442" class="lbl">CV C</text>
  <text x="52" y="456" class="val">jack (zawsze)</text>
  <!-- sleeve GND -->
  <line x1="68" y1="475" x2="68" y2="496" stroke="black" stroke-width="2"/>
  <line x1="55" y1="496" x2="81" y2="496" stroke="black" stroke-width="2.5"/>
  <line x1="60" y1="504" x2="76" y2="504" stroke="black" stroke-width="2.5"/>
  <line x1="65" y1="512" x2="71" y2="512" stroke="black" stroke-width="2.5"/>
  <!-- tip wire right -->
  <line x1="83" y1="460" x2="132" y2="460" stroke="black" stroke-width="2"/>

  <!-- C2 (0.1µF) — zawsze w ścieżce -->
  <line x1="132" y1="443" x2="132" y2="477" stroke="black" stroke-width="3"/>
  <line x1="141" y1="443" x2="141" y2="477" stroke="black" stroke-width="3"/>
  <line x1="141" y1="460" x2="208" y2="460" stroke="black" stroke-width="2"/>
  <text x="136" y="436" text-anchor="middle" class="lbl">C2</text>
  <text x="136" y="422" text-anchor="middle" class="val">0.1µF</text>

  <!-- node_C -->
  <circle cx="208" cy="460" r="5" fill="black"/>

  <!-- R3 (10kΩ) shunt do GND -->
  <line x1="208" y1="460" x2="208" y2="486" stroke="black" stroke-width="2"/>
  <rect x="193" y="486" width="30" height="50" fill="white" stroke="black" stroke-width="2"/>
  <text x="246" y="504" class="lbl">R3</text>
  <text x="246" y="518" class="val">10kΩ</text>
  <line x1="208" y1="536" x2="208" y2="562" stroke="black" stroke-width="2"/>
  <!-- GND -->
  <line x1="193" y1="562" x2="223" y2="562" stroke="black" stroke-width="2.5"/>
  <line x1="198" y1="570" x2="218" y2="570" stroke="black" stroke-width="2.5"/>
  <line x1="203" y1="578" x2="213" y2="578" stroke="black" stroke-width="2.5"/>
  <text x="208" y="594" text-anchor="middle" class="val">GND</text>

  <!-- R4 (1kΩ) od node_C do bazy TR2 -->
  <line x1="208" y1="460" x2="250" y2="460" stroke="black" stroke-width="2"/>
  <rect x="250" y="446" width="54" height="28" fill="white" stroke="black" stroke-width="2"/>
  <text x="277" y="458" text-anchor="middle" class="val">R4</text>
  <text x="277" y="470" text-anchor="middle" class="val">1kΩ</text>
  <line x1="304" y1="460" x2="536" y2="460" stroke="black" stroke-width="2"/>

  <!-- ═══════════════════
       D2 (1N4148) — klamp bazy TR2
       ═══════════════════ -->
  <circle cx="490" cy="460" r="5" fill="black"/>
  <line x1="490" y1="460" x2="490" y2="468" stroke="black" stroke-width="2"/>
  <line x1="479" y1="468" x2="501" y2="468" stroke="black" stroke-width="2.5"/>
  <polygon points="490,468 481,486 499,486" fill="black"/>
  <line x1="490" y1="486" x2="490" y2="516" stroke="black" stroke-width="2"/>
  <line x1="477" y1="516" x2="503" y2="516" stroke="black" stroke-width="2.5"/>
  <line x1="482" y1="524" x2="498" y2="524" stroke="black" stroke-width="2.5"/>
  <line x1="487" y1="532" x2="493" y2="532" stroke="black" stroke-width="2.5"/>
  <text x="506" y="475" class="val">D2</text>
  <text x="506" y="487" class="val">1N4148</text>

  <!-- ═══════════════════
       TR2 (BC547) — centrum (590, 460)
       ═══════════════════ -->
  <line x1="536" y1="430" x2="536" y2="490" stroke="black" stroke-width="3"/>
  <line x1="536" y1="440" x2="580" y2="403" stroke="black" stroke-width="2"/>
  <line x1="536" y1="480" x2="580" y2="517" stroke="black" stroke-width="2"/>
  <!-- strzałka na emiterze TR2 -->
  <polygon points="566,507 580,517 572,520" fill="black"/>
  <!-- koło -->
  <circle cx="548" cy="460" r="32" fill="none" stroke="black" stroke-width="2"/>
  <!-- etykiety -->
  <text x="520" y="456" text-anchor="middle" class="pin">B</text>
  <text x="584" y="400" class="pin">C</text>
  <text x="584" y="524" class="pin">E</text>
  <text x="588" y="458" class="lbl">TR2</text>
  <text x="588" y="472" class="val">BC547</text>

  <!-- emiter TR2 do GND -->
  <line x1="580" y1="517" x2="656" y2="517" stroke="black" stroke-width="2"/>
  <line x1="656" y1="517" x2="656" y2="582" stroke="black" stroke-width="2"/>
  <line x1="641" y1="582" x2="671" y2="582" stroke="black" stroke-width="2.5"/>
  <line x1="646" y1="590" x2="666" y2="590" stroke="black" stroke-width="2.5"/>
  <line x1="651" y1="598" x2="661" y2="598" stroke="black" stroke-width="2.5"/>
  <text x="656" y="614" text-anchor="middle" class="val">GND</text>

  <!-- ═══════════════════════════════════════
       KOLEKTORY → tap_pin
       ═══════════════════════════════════════ -->

  <!-- kolektor TR1 -->
  <line x1="610" y1="143" x2="762" y2="143" stroke="black" stroke-width="2"/>
  <!-- kolektor TR2 -->
  <line x1="580" y1="403" x2="762" y2="403" stroke="black" stroke-width="2"/>
  <!-- pionowa linia łącząca kolektory -->
  <line x1="762" y1="143" x2="762" y2="403" stroke="black" stroke-width="2"/>
  <!-- junction doty -->
  <circle cx="762" cy="143" r="5" fill="black"/>
  <circle cx="762" cy="403" r="5" fill="black"/>
  <!-- węzeł tap_pin -->
  <circle cx="762" cy="273" r="5" fill="black"/>
  <!-- drut do bloku tap_pin -->
  <line x1="762" y1="273" x2="856" y2="273" stroke="black" stroke-width="2"/>

  <!-- blok wyjściowy tap_pin -->
  <rect x="856" y="251" width="124" height="44" fill="#eef4ff" stroke="#3366cc" stroke-width="2.5" rx="6"/>
  <text x="918" y="269" text-anchor="middle" class="lbl" font-weight="bold">tap_pin</text>
  <text x="918" y="285" text-anchor="middle" class="val">PCB pedału (~3.3V)</text>

  <!-- ═══════════════════
       PRZEŁĄCZNIK REC
       ═══════════════════ -->
  <line x1="918" y1="295" x2="918" y2="354" stroke="black" stroke-width="2"/>
  <!-- styki (normalnie otwarte) -->
  <circle cx="918" cy="354" r="4" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="918" cy="384" r="4" fill="none" stroke="black" stroke-width="2"/>
  <line x1="918" y1="388" x2="918" y2="440" stroke="black" stroke-width="2"/>
  <!-- etykieta -->
  <text x="934" y="368" class="lbl">REC</text>
  <text x="934" y="382" class="val">ON / OFF</text>
  <!-- GND pod REC -->
  <line x1="903" y1="440" x2="933" y2="440" stroke="black" stroke-width="2.5"/>
  <line x1="908" y1="448" x2="928" y2="448" stroke="black" stroke-width="2.5"/>
  <line x1="913" y1="456" x2="923" y2="456" stroke="black" stroke-width="2.5"/>
  <text x="918" y="472" text-anchor="middle" class="val">GND</text>

  <!-- notatka o wspólnej masie -->
  <rect x="856" y="496" width="210" height="40" fill="#fffff0" stroke="#aaa" stroke-width="1.5" rx="4"/>
  <text x="961" y="512" text-anchor="middle" class="val" font-weight="bold">Wszystkie GND = masa pedału</text>
  <text x="961" y="528" text-anchor="middle" class="val">(wspólny punkt odniesienia)</text>

  <!-- ═══════════════════════════════════════
       RAMKI SEKCJI
       ═══════════════════════════════════════ -->

  <!-- wejścia A/B + SELECT -->
  <rect x="26" y="116" width="256" height="170" fill="none" stroke="#aaa" stroke-width="1.5"
        stroke-dasharray="7,4" rx="5"/>
  <text x="34" y="113" class="val" fill="#888">wejścia A / B + SELECT</text>

  <!-- wejście C -->
  <rect x="26" y="432" width="328" height="90" fill="none" stroke="#aaa" stroke-width="1.5"
        stroke-dasharray="7,4" rx="5"/>
  <text x="34" y="429" class="val" fill="#888">wejście C (zawsze aktywne + zawsze HP)</text>

  <!-- filtr HP -->
  <rect x="278" y="120" width="178" height="230" fill="none" stroke="#aaa" stroke-width="1.5"
        stroke-dasharray="7,4" rx="5"/>
  <text x="286" y="117" class="val" fill="#888">filtr HP  (fc ≈ 160 Hz, τ ≈ 1 ms)</text>

  <!-- ═══════════════════════════════════════
       PRZYPISY
       ═══════════════════════════════════════ -->
  <line x1="20" y1="634" x2="1080" y2="634" stroke="#ddd" stroke-width="1"/>
  <text x="26" y="650" class="note">SW_HP: norm. otwarty = filtr HP aktywny (gate skracany do ~1ms);  zwarty = bypass (sygnał CV bezpośrednio do bazy)</text>
  <text x="26" y="664" class="note">D1/D2 (1N4148): katoda → baza TR, anoda → GND — klampuje ujemny spike filtra HP do −0.7V (ochrona Vebo BC547 = 6V)</text>

</svg>
